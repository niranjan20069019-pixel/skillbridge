{% extends "base.html" %}
{% block title %}Create Account — SkillBridge{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);">

  <!-- Subtle background glow -->
  <div style="position:fixed;inset:0;pointer-events:none;overflow:hidden;">
    <div style="position:absolute;top:-200px;right:-200px;width:500px;height:500px;border-radius:50%;background:rgba(37,99,235,0.06);filter:blur(80px);"></div>
    <div style="position:absolute;bottom:-200px;left:-200px;width:500px;height:500px;border-radius:50%;background:rgba(139,92,246,0.05);filter:blur(80px);"></div>
  </div>

  <div style="width:100%;max-width:480px;position:relative;z-index:1;">

    <!-- Logo + heading -->
    <div style="text-align:center;margin-bottom:32px;" class="anim-fade-up">
      <a href="/" class="logo" style="justify-content:center;margin-bottom:24px;display:inline-flex;">
        <div class="logo-icon">
          <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
          </svg>
        </div>
        <span class="logo-text">Skill<span>Bridge</span></span>
      </a>
      <h1 style="font-size:26px;font-weight:800;margin-bottom:6px;">Join SkillBridge</h1>
      <p style="font-size:14px;color:var(--text-muted);">Free forever — start learning in minutes</p>
    </div>

    <!-- Form card -->
    <div class="card anim-fade-up delay-1" style="padding:32px;">
      <form method="POST" action="/register" novalidate>

        <!-- Name + Email -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;">
          <div>
            <label class="field-label" for="reg-name">Full Name</label>
            <input id="reg-name" type="text" name="name" required placeholder="Priya Sharma" class="input"/>
          </div>
          <div>
            <label class="field-label" for="reg-email">Email</label>
            <input id="reg-email" type="email" name="email" required placeholder="you@example.com" class="input"/>
          </div>
        </div>

        <div style="margin-bottom:18px;">
          <label class="field-label" for="reg-password">Password</label>
          <input id="reg-password" type="password" name="password" required placeholder="Minimum 6 characters" minlength="6" class="input"/>
        </div>

        <!-- Interest + Language -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;">
          <div>
            <label class="field-label" for="reg-interest">I'm Interested In</label>
            <select id="reg-interest" name="interest" class="input">
              <option value="Technology">💻 Technology</option>
              <option value="Marketing">📊 Marketing</option>
              <option value="Finance">💰 Finance</option>
              <option value="Agriculture">🌱 Agriculture</option>
              <option value="Language">🗣️ Language</option>
              <option value="Healthcare">❤️ Healthcare</option>
            </select>
          </div>
          <div>
            <label class="field-label" for="reg-language">Preferred Language</label>
            <select id="reg-language" name="language" class="input">
              <option value="en">🇬🇧 English</option>
              <option value="hi">🇮🇳 Hindi</option>
              <option value="ta">🇮🇳 Tamil</option>
              <option value="te">🇮🇳 Telugu</option>
              <option value="bn">🇮🇳 Bengali</option>
              <option value="mr">🇮🇳 Marathi</option>
              <option value="gu">🇮🇳 Gujarati</option>
              <option value="kn">🇮🇳 Kannada</option>
              <option value="ml">🇮🇳 Malayalam</option>
              <option value="pa">🇮🇳 Punjabi</option>
            </select>
          </div>
        </div>

        <div style="margin-bottom:24px;">
          <label class="field-label" for="reg-location">
            Location <span style="text-transform:none;font-weight:400;color:var(--text-faint);">(optional)</span>
          </label>
          <input id="reg-location" type="text" name="location" placeholder="e.g. Varanasi, UP" class="input"/>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
          Create Free Account
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
        </button>
      </form>

      <div class="divider" style="margin:24px 0;"></div>

      <p style="text-align:center;font-size:14px;color:var(--text-muted);">
        Already have an account?
        <a href="/login" style="color:var(--brand-light);font-weight:600;margin-left:4px;">Sign in →</a>
      </p>
    </div>

    <!-- Trust badges -->
    <div style="display:flex;align-items:center;justify-content:center;gap:24px;margin-top:20px;" class="anim-fade-up delay-2">
      <span style="font-size:12px;color:var(--text-faint);display:flex;align-items:center;gap:5px;">🔒 Secure & Private</span>
      <span style="font-size:12px;color:var(--text-faint);display:flex;align-items:center;gap:5px;">✅ 100% Free</span>
      <span style="font-size:12px;color:var(--text-faint);display:flex;align-items:center;gap:5px;">🏅 Certified Courses</span>
    </div>
  </div>
</div>
{% endblock %}
