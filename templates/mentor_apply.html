{% extends "base.html" %}
{% block title %}Become a Mentor — SkillBridge{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4" style="background:#080e1a;">
  <div class="w-full max-w-lg rounded-2xl border p-8" style="background:#0f172a;border-color:rgba(255,255,255,0.07);">
    <a href="{{ url_for('mentors') }}" class="text-sm font-body mb-6 inline-block" style="color:rgba(255,255,255,0.4);">← Back to Mentors</a>
    <h1 class="font-display font-bold text-2xl text-white mb-6">🤝 Become a Mentor</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="mb-4 px-4 py-3 rounded-xl text-sm font-body bg-green-900/40 text-green-300 border border-green-700/40">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST" class="space-y-4">
      <div>
        <label class="text-xs font-body mb-1 block" style="color:rgba(255,255,255,0.5);">Bio</label>
        <textarea name="bio" rows="3" class="input" placeholder="Tell learners about yourself…" required>{{ existing.bio if existing else '' }}</textarea>
      </div>
      <div>
        <label class="text-xs font-body mb-1 block" style="color:rgba(255,255,255,0.5);">Skills (comma-separated)</label>
        <input name="skills" class="input" placeholder="Python, Data Analysis, SQL…" value="{{ existing.skills if existing else '' }}" required>
      </div>
      <div>
        <label class="text-xs font-body mb-1 block" style="color:rgba(255,255,255,0.5);">Experience</label>
        <input name="experience" class="input" placeholder="e.g. 3 years at Google" value="{{ existing.experience if existing else '' }}">
      </div>
      <div>
        <label class="text-xs font-body mb-1 block" style="color:rgba(255,255,255,0.5);">LinkedIn URL</label>
        <input name="linkedin" class="input" placeholder="https://linkedin.com/in/…" value="{{ existing.linkedin if existing else '' }}">
      </div>
      <button type="submit" class="btn-primary w-full justify-center">Submit Application</button>
    </form>
  </div>
</div>
{% endblock %}
